apiVersion: apps/v1
kind: Deployment
metadata:
  name: publishing-platform-web
  namespace: publishing-platform
  labels:
    app.kubernetes.io/name: publishing-platform-web
    app.kubernetes.io/part-of: publishing-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: publishing-platform-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: publishing-platform-web
        app.kubernetes.io/part-of: publishing-platform
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/openautonomyx/publishing-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4321
          envFrom:
            - configMapRef:
                name: publishing-platform-web-config
            - secretRef:
                name: publishing-platform-web-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
