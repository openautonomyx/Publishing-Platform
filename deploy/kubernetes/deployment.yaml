apiVersion: apps/v1
kind: Deployment
metadata:
  name: publishing-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: publishing-platform
  template:
    metadata:
      labels:
        app: publishing-platform
    spec:
      containers:
        - name: web
          image: ghcr.io/openautonomyx/publishing-platform:latest
          ports:
            - containerPort: 4321
          envFrom:
            - secretRef:
                name: publishing-platform-secrets
            - configMapRef:
                name: publishing-platform-config
          readinessProbe:
            httpGet:
              path: /
              port: 4321
          livenessProbe:
            httpGet:
              path: /
              port: 4321
---
apiVersion: v1
kind: Service
metadata:
  name: publishing-platform
spec:
  selector:
    app: publishing-platform
  ports:
    - port: 80
      targetPort: 4321
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: publishing-platform
spec:
  rules:
    - host: publishing.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: publishing-platform
                port:
                  number: 80
