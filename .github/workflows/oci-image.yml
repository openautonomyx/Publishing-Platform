name: Build and Publish OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g pnpm@9.12.0

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm build

      - name: Install Stacker
        run: |
          sudo apt-get update
          sudo apt-get install -y lxc uidmap skopeo umoci jq curl
          curl -sL https://github.com/project-stacker/stacker/releases/download/v1.2.0/stacker-linux-amd64 -o stacker
          chmod +x stacker
          sudo mv stacker /usr/local/bin/
          stacker --version

      - name: Build OCI image
        run: sudo stacker build

      - name: Publish to GHCR
        env:
          GHCR_IMAGE: ghcr.io/openautonomyx/publishing-platform:latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          sudo stacker publish --url "docker://$GHCR_IMAGE" publishing-platform