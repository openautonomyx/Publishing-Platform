name: OCI Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then VERSION="latest"; fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=ghcr.io/openautonomyx/publishing-platform:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${{ secrets.DOCKERHUB_USERNAME }}/publishing-platform:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Stacker
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lxc uidmap skopeo umoci jq curl ca-certificates
          curl -L https://github.com/project-stacker/stacker/releases/latest/download/stacker -o stacker
          chmod +x stacker
          sudo mv stacker /usr/local/bin/stacker
          stacker --version

      - name: Build OCI image
        run: |
          sudo stacker build

      - name: Publish to GHCR
        env:
          REGISTRY_AUTH_FILE: /tmp/containers-auth.json
          GHCR_IMAGE: ${{ steps.meta.outputs.ghcr_image }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          sudo stacker publish --url "docker://$GHCR_IMAGE" publishing-platform

      - name: Publish to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        env:
          DOCKERHUB_IMAGE: ${{ steps.meta.outputs.dockerhub_image }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | skopeo login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin
          sudo stacker publish --url "docker://$DOCKERHUB_IMAGE" publishing-platform
