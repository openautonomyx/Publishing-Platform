name: Build and Publish OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g pnpm@9.12.0

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm build

      - name: Build and push OCI image
        uses: project-stacker/stacker-build-push-action@v1.1.1
        with:
          file: stacker.yaml
          url: docker://ghcr.io/openautonomyx/publishing-platform
          tags: latest
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          layer-type: tar