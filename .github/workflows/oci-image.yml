name: OCI Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then VERSION="latest"; fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=ghcr.io/openautonomyx/publishing-platform:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@9.12.0

      - name: Install deps (debug)
        run: |
          pnpm install --no-frozen-lockfile 2>&1 || true
          ls -la node_modules 2>&1 || echo "No node_modules"

      - name: Install Stacker
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lxc uidmap skopeo umoci jq curl ca-certificates
          curl -L https://github.com/project-stacker/stacker/releases/latest/download/stacker -o stacker
          chmod +x stacker
          sudo mv stacker /usr/local/bin/stacker
          stacker --version

      - name: Build OCI image
        run: sudo stacker build

      - name: Publish to GHCR
        env:
          GHCR_IMAGE: ${{ steps.meta.outputs.ghcr_image }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          sudo stacker publish --url "docker://$GHCR_IMAGE" publishing-platform
